{% extends "base.html" %}

{% block content %}

<h2>Delete Booking</h2>

<p>Are you sure you want to delete your booking on {{ booking.date }} at {{ booking.time }}?</p>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'my_bookings' %}">Cancel</a>

{% endblock %}
